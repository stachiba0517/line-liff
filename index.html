<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p>読み込み中...</p>
  <script>
    const LIFF_ID = "2008532225-AqpmBDeW";
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdLLr89G09vQaXr-cAG-Si3W4ygCfzln1e5-JPA8VOMsho06Q/viewform";

    function redirectToForm(uid, displayName) {
      window.location.href = FORM_URL
        + "?entry.156326472=" + encodeURIComponent(uid)
        + "&entry.1613562678=" + encodeURIComponent(displayName);
    }

    liff.init({ liffId: LIFF_ID })
      .then(() => {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        return liff.getProfile();
      })
      .then(profile => {
        if (!profile) return;
        const uid = profile.userId;
        const displayName = profile.displayName;

        liff.sendMessages([{
          type: 'text',
          text: 'アンケートを開始します。'
        }])
        .catch(() => {}) // 送信失敗しても続行
        .finally(() => {
          redirectToForm(uid, displayName);
        });
      })
      .catch(err => {
        document.body.innerText = "エラー: " + err.message;
      });
  </script>
</body>
</html>
